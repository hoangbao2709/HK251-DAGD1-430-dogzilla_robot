<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>QR + SLAM Map Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #08111f;
      color: #eaf2ff;
    }

    .wrap {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 16px;
      padding: 16px;
      min-height: 100vh;
    }

    .left-col,
    .right-col {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .panel {
      background: linear-gradient(180deg, #101b30 0%, #0d1628 100%);
      border: 1px solid #284066;
      border-radius: 18px;
      padding: 14px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ffd84d;
      text-shadow: 0 0 10px rgba(255,216,77,0.25);
    }

    .video-box {
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid #35527f;
      background: #000;
    }

    .video-box img {
      width: 100%;
      display: block;
    }

    .canvas-wrap {
      border: 1px solid #284066;
      border-radius: 14px;
      overflow: hidden;
      background: #09111d;
    }

    #topdownCanvas {
      width: 100%;
      display: block;
      background: #09111d;
    }

    .map-live-wrap {
      position: relative;
      border: 1px solid #284066;
      border-radius: 14px;
      overflow: hidden;
      background: #0a0f1a;
    }

    #slamMapImage {
      width: 100%;
      display: block;
      background: #111;
      user-select: none;
      -webkit-user-drag: none;
    }

    #slamOverlay {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: none;
    }

    .list {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .item {
      background: #0d1728;
      border: 1px solid #284066;
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.6;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: #b7c9ea;
      line-height: 1.6;
      white-space: pre-line;
    }

    .note {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #37507b;
      background: #0d1728;
      color: #c9d8f2;
      font-size: 14px;
      line-height: 1.6;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .mini-box {
      background: #0d1728;
      border: 1px solid #284066;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn-save {
      background: linear-gradient(180deg, #00e676 0%, #00c853 100%);
      color: #04120a;
      box-shadow: 0 0 18px rgba(0, 230, 118, 0.28);
    }

    .btn-save:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 24px rgba(0, 230, 118, 0.42);
    }

    .btn-delete {
      background: linear-gradient(180deg, #ff6b6b 0%, #ff3b30 100%);
      color: white;
      box-shadow: 0 0 18px rgba(255, 59, 48, 0.25);
    }

    .btn-delete:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 24px rgba(255, 59, 48, 0.4);
    }

    .btn-clear {
      background: linear-gradient(180deg, #ffd54a 0%, #ffb300 100%);
      color: #231800;
      box-shadow: 0 0 18px rgba(255, 213, 74, 0.28);
    }

    .btn-clear:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 24px rgba(255, 213, 74, 0.4);
    }

    .saved-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }

    .saved-item {
      background: #0b1424;
      border: 1px solid #2f4b73;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    code {
      color: #ffd84d;
    }

    @media (max-width: 1080px) {
      .wrap { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .mini-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="left-col">
      <div class="panel">
        <div class="title">Camera Feed</div>
        <div class="video-box">
          <img src="/video_feed" alt="video feed" />
        </div>
        <div class="status" id="statusText">Đang kết nối...</div>
        <div class="list" id="qrList"></div>
      </div>

      <div class="panel">
        <div class="title">Top-Down QR View</div>
        <div class="canvas-wrap">
          <canvas id="topdownCanvas" width="700" height="700"></canvas>
        </div>
      </div>
    </div>

    <div class="right-col">
      <div class="panel">
        <div class="title">SLAM Map Overlay</div>

        <div class="map-live-wrap">
          <img id="slamMapImage" src="http://10.230.156.224:8080/map.png" alt="slam map" />
          <canvas id="slamOverlay"></canvas>
        </div>

        <div class="toolbar">
          <button class="btn btn-save" id="saveMarkerBtn">Save Marker</button>
          <button class="btn btn-delete" id="deleteLastBtn">Xóa marker cuối</button>
          <button class="btn btn-clear" id="clearAllBtn">Xóa tất cả</button>
        </div>

        <div class="mini-grid">
          <div class="mini-box" id="robotInfo">Robot: chưa có dữ liệu</div>
          <div class="mini-box" id="obstacleInfo">Obstacle: chưa có dữ liệu</div>
        </div>

        <div class="note" id="mapNote">
          Map ảnh lấy từ <code>http://10.230.156.224:8080/map.png</code><br>
          State lấy từ <code>http://10.230.156.224:8080/state</code><br>
          Marker đã save sẽ được lưu trong trình duyệt.
        </div>

        <div class="saved-list" id="savedList"></div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("topdownCanvas");
    const ctx = canvas.getContext("2d");

    const qrList = document.getElementById("qrList");
    const statusText = document.getElementById("statusText");

    const slamMapImage = document.getElementById("slamMapImage");
    const slamOverlay = document.getElementById("slamOverlay");
    const slamCtx = slamOverlay.getContext("2d");

    const robotInfo = document.getElementById("robotInfo");
    const obstacleInfo = document.getElementById("obstacleInfo");
    const mapNote = document.getElementById("mapNote");
    const savedList = document.getElementById("savedList");

    const saveMarkerBtn = document.getElementById("saveMarkerBtn");
    const deleteLastBtn = document.getElementById("deleteLastBtn");
    const clearAllBtn = document.getElementById("clearAllBtn");

    let qrState = { ok: false, items: [] };
    let slamState = null;
    let polling = false;
    let liveObstacle = null;
    let savedMarkers = loadSavedMarkers();

    function drawCircle(ctx2d, x, y, r, color) {
      ctx2d.fillStyle = color;
      ctx2d.beginPath();
      ctx2d.arc(x, y, r, 0, Math.PI * 2);
      ctx2d.fill();
    }

    function normalizeAngle(a) {
      return Math.atan2(Math.sin(a), Math.cos(a));
    }

    function drawGrid() {
      const w = canvas.width;
      const h = canvas.height;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#09111d";
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = "rgba(93,146,224,0.18)";
      ctx.lineWidth = 1;

      for (let x = 0; x <= w; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y <= h; y += 50) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }
    }

    function drawTopdownQR(data) {
      drawGrid();

      const w = canvas.width;
      const h = canvas.height;
      const camX = w / 2;
      const camY = h - 90;
      const scale = 260;

      ctx.strokeStyle = "#ffe14d";
      ctx.lineWidth = 4;
      ctx.shadowColor = "rgba(255,225,77,0.35)";
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(camX, camY);
      ctx.lineTo(camX, 80);
      ctx.stroke();
      ctx.shadowBlur = 0;

      drawCircle(ctx, camX, camY, 22, "#00d9ff");

      ctx.strokeStyle = "rgba(0, 217, 255, 0.45)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(camX, camY, 30, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "#d9fbff";
      ctx.font = "bold 16px Arial";
      ctx.fillText("CAM", camX - 18, camY + 48);

      if (!data.ok || !data.items || !data.items.length) {
        ctx.fillStyle = "#ff7a7a";
        ctx.font = "bold 24px Arial";
        ctx.fillText("QR NOT FOUND", w / 2 - 90, 50);
        return;
      }

      for (const item of data.items) {
        const qrX = camX + item.lateral_x_m * scale;
        const qrY = camY - item.forward_z_m * scale;

        const targetX = camX + item.target_x_m * scale;
        const targetY = camY - item.target_z_m * scale;

        ctx.strokeStyle = "rgba(0,255,157,0.8)";
        ctx.lineWidth = 3;
        ctx.shadowColor = "rgba(0,255,157,0.28)";
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.moveTo(camX, camY);
        ctx.lineTo(qrX, qrY);
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = "#ffd84d";
        ctx.lineWidth = 5;
        ctx.shadowColor = "rgba(255,216,77,0.32)";
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(camX, camY);
        ctx.lineTo(targetX, targetY);
        ctx.stroke();
        ctx.shadowBlur = 0;

        drawCircle(ctx, qrX, qrY, 10, "#ff2d78");

        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(qrX, qrY, 16, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 16px Arial";
        ctx.fillText(`QR: ${item.text}`, qrX + 14, qrY - 8);

        drawCircle(ctx, targetX, targetY, 15, "#ffd84d");

        ctx.strokeStyle = "#fff6b0";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(targetX, targetY, 23, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "#fff6b0";
        ctx.font = "bold 17px Arial";
        ctx.fillText("TARGET", targetX + 18, targetY + 6);

        ctx.fillStyle = "#d8e6ff";
        ctx.font = "14px Arial";
        ctx.fillText(`${item.angle_deg.toFixed(1)}°`, targetX + 18, targetY + 26);
      }
    }

    function renderQrList(data) {
      qrList.innerHTML = "";

      if (!data.ok || !data.items || !data.items.length) {
        qrList.innerHTML = `<div class="item">Chưa đọc được QR</div>`;
        return;
      }

      for (const item of data.items) {
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <b>QR:</b> ${item.text}<br>
          <b>Type:</b> ${item.qr_type}<br>
          <b>Angle:</b> ${item.angle_deg.toFixed(2)}°<br>
          <b>Distance:</b> ${item.distance_m.toFixed(3)} m<br>
          <b>QR tx:</b> ${item.lateral_x_m.toFixed(3)} m<br>
          <b>QR tz:</b> ${item.forward_z_m.toFixed(3)} m<br>
          <b>Target x:</b> ${item.target_x_m.toFixed(3)} m<br>
          <b>Target z:</b> ${item.target_z_m.toFixed(3)} m<br>
          <b>Direction:</b> ${item.direction}
        `;
        qrList.appendChild(div);
      }
    }

    function resizeSlamOverlay() {
      const rect = slamMapImage.getBoundingClientRect();
      if (!rect.width || !rect.height) return;

      slamOverlay.width = rect.width;
      slamOverlay.height = rect.height;
      slamOverlay.style.width = rect.width + "px";
      slamOverlay.style.height = rect.height + "px";
    }

    function mapToPixel(x, y, renderInfo) {
      const pxCells = (x - renderInfo.origin_x) / renderInfo.resolution;
      const pyCells = renderInfo.height_cells - ((y - renderInfo.origin_y) / renderInfo.resolution);

      const scaleX = slamOverlay.width / renderInfo.width_cells;
      const scaleY = slamOverlay.height / renderInfo.height_cells;

      return {
        x: pxCells * scaleX,
        y: pyCells * scaleY
      };
    }

    function findNearestObstacleAhead(state) {
      if (!state || !state.pose || !state.scan || !Array.isArray(state.scan.points)) {
        return null;
      }

      const pose = state.pose;
      const points = state.scan.points;
      const yaw = pose.theta || 0;

      let best = null;
      let bestDist = Infinity;

      for (const p of points) {
        if (typeof p.x !== "number" || typeof p.y !== "number") continue;

        const dx = p.x - pose.x;
        const dy = p.y - pose.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (!isFinite(dist) || dist < 0.05) continue;

        const angle = Math.atan2(dy, dx);
        const diff = Math.abs(normalizeAngle(angle - yaw));

        if (diff <= 0.35) {
          if (dist < bestDist) {
            bestDist = dist;
            best = {
              x: p.x,
              y: p.y,
              dist,
              angle,
              diff
            };
          }
        }
      }

      return best;
    }

    function drawHeadingArrow(origin, yaw, lenPx) {
      const endX = origin.x + Math.cos(yaw) * lenPx;
      const endY = origin.y - Math.sin(yaw) * lenPx;

      slamCtx.strokeStyle = "#ffe14d";
      slamCtx.lineWidth = 4;
      slamCtx.shadowColor = "rgba(255,225,77,0.35)";
      slamCtx.shadowBlur = 10;
      slamCtx.beginPath();
      slamCtx.moveTo(origin.x, origin.y);
      slamCtx.lineTo(endX, endY);
      slamCtx.stroke();

      const headLen = 12;
      const a1 = yaw - Math.PI / 7;
      const a2 = yaw + Math.PI / 7;

      slamCtx.beginPath();
      slamCtx.moveTo(endX, endY);
      slamCtx.lineTo(endX - Math.cos(a1) * headLen, endY + Math.sin(a1) * headLen);
      slamCtx.moveTo(endX, endY);
      slamCtx.lineTo(endX - Math.cos(a2) * headLen, endY + Math.sin(a2) * headLen);
      slamCtx.stroke();
      slamCtx.shadowBlur = 0;
    }

    function getCurrentQrText() {
      if (qrState && qrState.ok && qrState.items && qrState.items.length) {
        return qrState.items[0].text || "QR";
      }
      return "NO_QR";
    }

    function loadSavedMarkers() {
      try {
        const raw = localStorage.getItem("saved_qr_markers");
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function persistSavedMarkers() {
      localStorage.setItem("saved_qr_markers", JSON.stringify(savedMarkers));
    }

    function renderSavedList() {
      savedList.innerHTML = "";

      if (!savedMarkers.length) {
        savedList.innerHTML = `<div class="saved-item">Chưa có marker nào được lưu</div>`;
        return;
      }

      savedMarkers
        .slice()
        .reverse()
        .forEach((m, idx) => {
          const div = document.createElement("div");
          div.className = "saved-item";
          div.innerHTML = `
            <b>${m.label}</b><br>
            x: ${m.x.toFixed(3)}, y: ${m.y.toFixed(3)}<br>
            dist: ${m.distance_m.toFixed(3)} m<br>
            time: ${new Date(m.saved_at).toLocaleString()}
          `;
          savedList.appendChild(div);
        });
    }

    function drawSavedMarkers() {
      if (!slamState || !slamState.render_info || !savedMarkers.length) return;

      for (const marker of savedMarkers) {
        const pt = mapToPixel(marker.x, marker.y, slamState.render_info);

        slamCtx.shadowColor = marker.colorGlow || "rgba(0,255,157,0.35)";
        slamCtx.shadowBlur = 14;

        slamCtx.strokeStyle = marker.lineColor || "#00ff9d";
        slamCtx.lineWidth = 3;
        slamCtx.beginPath();
        slamCtx.arc(pt.x, pt.y, 16, 0, Math.PI * 2);
        slamCtx.stroke();

        drawCircle(slamCtx, pt.x, pt.y, 8, marker.color || "#00ff9d");

        slamCtx.shadowBlur = 0;

        slamCtx.fillStyle = "#ffffff";
        slamCtx.font = "bold 14px Arial";
        slamCtx.fillText(marker.label, pt.x + 14, pt.y - 8);

        slamCtx.fillStyle = "#d8ffe8";
        slamCtx.font = "13px Arial";
        slamCtx.fillText(`${marker.distance_m.toFixed(2)} m`, pt.x + 14, pt.y + 11);
      }
    }

    function saveCurrentMarker() {
      if (!liveObstacle) {
        alert("Chưa có vật cản phía trước để lưu.");
        return;
      }

      const label = getCurrentQrText();
      savedMarkers.push({
        label,
        x: liveObstacle.x,
        y: liveObstacle.y,
        distance_m: liveObstacle.dist,
        saved_at: Date.now(),
        color: "#00ff9d",
        lineColor: "#00ff9d",
        colorGlow: "rgba(0,255,157,0.35)"
      });

      persistSavedMarkers();
      renderSavedList();
      drawSlamOverlay();
    }

    function deleteLastMarker() {
      if (!savedMarkers.length) return;
      savedMarkers.pop();
      persistSavedMarkers();
      renderSavedList();
      drawSlamOverlay();
    }

    function clearAllMarkers() {
      if (!savedMarkers.length) return;
      savedMarkers = [];
      persistSavedMarkers();
      renderSavedList();
      drawSlamOverlay();
    }

    function drawSlamOverlay() {
      slamCtx.clearRect(0, 0, slamOverlay.width, slamOverlay.height);
      liveObstacle = null;

      if (!slamState || !slamState.pose || !slamState.render_info) {
        slamCtx.fillStyle = "rgba(255, 216, 77, 0.95)";
        slamCtx.font = "bold 16px Arial";
        slamCtx.fillText("Waiting for /state...", 18, 28);
        return;
      }

      const pose = slamState.pose;
      const renderInfo = slamState.render_info;
      const robotPx = mapToPixel(pose.x, pose.y, renderInfo);

      drawSavedMarkers();

      drawCircle(slamCtx, robotPx.x, robotPx.y, 8, "#00d9ff");

      slamCtx.strokeStyle = "rgba(0, 217, 255, 0.48)";
      slamCtx.lineWidth = 3;
      slamCtx.shadowColor = "rgba(0, 217, 255, 0.28)";
      slamCtx.shadowBlur = 12;
      slamCtx.beginPath();
      slamCtx.arc(robotPx.x, robotPx.y, 16, 0, Math.PI * 2);
      slamCtx.stroke();
      slamCtx.shadowBlur = 0;

      drawHeadingArrow(robotPx, pose.theta || 0, 52);

      slamCtx.fillStyle = "#00e5ff";
      slamCtx.strokeStyle = "rgba(0, 40, 60, 0.9)";
      slamCtx.lineWidth = 3;
      slamCtx.font = "bold 15px Arial";
      slamCtx.strokeText("ROBOT", robotPx.x + 14, robotPx.y - 10);
      slamCtx.fillText("ROBOT", robotPx.x + 14, robotPx.y - 10);

      const obstacle = findNearestObstacleAhead(slamState);
      if (obstacle) {
        liveObstacle = obstacle;
        const obsPx = mapToPixel(obstacle.x, obstacle.y, renderInfo);

        slamCtx.strokeStyle = "rgba(255, 58, 98, 0.72)";
        slamCtx.lineWidth = 3;
        slamCtx.shadowColor = "rgba(255, 58, 98, 0.32)";
        slamCtx.shadowBlur = 12;
        slamCtx.beginPath();
        slamCtx.moveTo(robotPx.x, robotPx.y);
        slamCtx.lineTo(obsPx.x, obsPx.y);
        slamCtx.stroke();
        slamCtx.shadowBlur = 0;

        drawCircle(slamCtx, obsPx.x, obsPx.y, 9, "#ff2d78");

        slamCtx.strokeStyle = "rgba(255,255,255,0.5)";
        slamCtx.lineWidth = 3;
        slamCtx.beginPath();
        slamCtx.arc(obsPx.x, obsPx.y, 17, 0, Math.PI * 2);
        slamCtx.stroke();

        const qrText = getCurrentQrText();

        slamCtx.fillStyle = "#ffea00";
        slamCtx.strokeStyle = "rgba(60, 0, 20, 0.95)";
        slamCtx.lineWidth = 3;
        slamCtx.font = "bold 15px Arial";
        slamCtx.strokeText(qrText, obsPx.x + 14, obsPx.y - 9);
        slamCtx.fillText(qrText, obsPx.x + 14, obsPx.y - 9);

        slamCtx.fillStyle = "#ffb3c7";
        slamCtx.font = "bold 14px Arial";
        slamCtx.fillText(`Obstacle ${obstacle.dist.toFixed(2)} m`, obsPx.x + 14, obsPx.y + 13);

        obstacleInfo.innerHTML = `
          <b>Obstacle:</b> có dữ liệu<br>
          <b>Distance:</b> ${obstacle.dist.toFixed(3)} m<br>
          <b>Point:</b> (${obstacle.x.toFixed(3)}, ${obstacle.y.toFixed(3)})<br>
          <b>QR hiện tại:</b> ${qrText}
        `;
      } else {
        obstacleInfo.innerHTML = `<b>Obstacle:</b> chưa tìm thấy vật cản phía trước`;
      }

      robotInfo.innerHTML = `
        <b>Robot:</b> pose OK<br>
        <b>x:</b> ${pose.x.toFixed(3)}<br>
        <b>y:</b> ${pose.y.toFixed(3)}<br>
        <b>theta:</b> ${(pose.theta || 0).toFixed(4)} rad
      `;

      if (slamState.status) {
        mapNote.innerHTML = `
          Map ảnh từ <code>http://10.230.156.224:8080/map.png</code><br>
          <b>slam_ok:</b> ${!!slamState.status.slam_ok} |
          <b>tf_ok:</b> ${!!slamState.status.tf_ok} |
          <b>planner_ok:</b> ${!!slamState.status.planner_ok}<br>
          <b>map_age_sec:</b> ${Number(slamState.status.map_age_sec || 0).toFixed(3)} |
          <b>pose_age_sec:</b> ${Number(slamState.status.pose_age_sec || 0).toFixed(3)}<br>
          <b>Saved markers:</b> ${savedMarkers.length}
        `;
      }
    }

    async function fetchQrState() {
      const res = await fetch("/qr_state", { cache: "no-store" });
      return await res.json();
    }

    async function fetchSlamState() {
      const res = await fetch("http://10.230.156.224:8080/state", { cache: "no-store" });
      return await res.json();
    }

    async function fetchAllState() {
      if (polling) return;
      polling = true;

      try {
        try {
          qrState = await fetchQrState();
        } catch {
          qrState = { ok: false, items: [] };
        }

        try {
          slamState = await fetchSlamState();
        } catch {
          slamState = null;
        }

        drawTopdownQR(qrState);
        renderQrList(qrState);
        resizeSlamOverlay();
        drawSlamOverlay();

        const qrOk = !!(qrState && qrState.ok);
        const slamOk = !!(slamState && slamState.pose);

        if (qrOk && slamOk) {
          statusText.textContent = `QR OK | SLAM OK | cập nhật: ${new Date().toLocaleTimeString()}`;
        } else if (slamOk) {
          statusText.textContent = `QR chưa thấy | SLAM OK | cập nhật: ${new Date().toLocaleTimeString()}`;
        } else if (qrOk) {
          statusText.textContent = `QR OK | SLAM chưa có | cập nhật: ${new Date().toLocaleTimeString()}`;
        } else {
          statusText.textContent = `QR chưa thấy | SLAM chưa có | cập nhật: ${new Date().toLocaleTimeString()}`;
        }

      } catch (e) {
        console.error(e);
        statusText.textContent = "Lỗi kết nối backend";
      } finally {
        polling = false;
      }
    }

    saveMarkerBtn.addEventListener("click", saveCurrentMarker);
    deleteLastBtn.addEventListener("click", deleteLastMarker);
    clearAllBtn.addEventListener("click", clearAllMarkers);

    slamMapImage.addEventListener("load", () => {
      resizeSlamOverlay();
      drawSlamOverlay();
    });

    window.addEventListener("resize", () => {
      resizeSlamOverlay();
      drawSlamOverlay();
    });

    renderSavedList();
    drawTopdownQR(qrState);
    renderQrList(qrState);
    resizeSlamOverlay();
    drawSlamOverlay();
    fetchAllState();

    setInterval(fetchAllState, 250);

    setInterval(() => {
      slamMapImage.src = "http://10.230.156.224:8080/map.png?t=" + Date.now();
    }, 1000);
  </script>
</body>
</html>
